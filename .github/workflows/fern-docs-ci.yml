# Validates Fern docs configuration on pull requests.

name: Fern docs (check)

on:
  pull_request:
    paths:
      - 'docs/fern/**'
      - 'docs/**'
      - 'packages/nemo-evaluator/**'
      - '.github/workflows/fern-docs-ci.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Regenerate autogenerated docs
        run: make docs-autogen

      - name: Lint and test API reference generator
        working-directory: ./docs
        run: |
          uv run --group docs ruff check scripts/
          uv run --group docs ruff format --check scripts/
          uv run --group docs python -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version docs/fern/fern.config.json)

      - name: Validate Fern configuration
        working-directory: ./docs/fern
        run: |
          fern check
          fern docs md check
