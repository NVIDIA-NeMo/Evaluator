name: "Build, validate, and release NeMo-Eval"

on:
  push:
    branches:
      - main
      - "r**"
      - "pull-request/**"
      - "deploy-release/*"
  workflow_dispatch:
    inputs:
      component:
        description: Component to release
        required: true
        default: nemo-evaluator
        type: choice
        options:
          - nemo-evaluator
          - nemo-evaluator-launcher
      release-ref:
        description: Full SHA (not short) or tag of the commit to build
        required: true
        type: string
      dry-run:
        description: "Dry Run: compute the release but do not publish"
        required: true
        default: true
        type: boolean
      create-gh-release:
        description: Create a GitHub release
        required: true
        default: true
        type: boolean
      version-bump-branch:
        description: Branch to push the version bump
        required: true
        type: string
  schedule:
    # Wed
    - cron: "0 1 * * 3"

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  pre-flight:
    if: github.event_name == 'push'
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_cicd_preflight.yml@v0.94.1

  validate-inputs:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.version-bump-branch }}" == "${{ inputs.release-ref }}" ]; then
            echo "Error: version-bump-branch cannot be the same as release-ref"
            echo "version-bump-branch: ${{ inputs.version-bump-branch }}"
            echo "release-ref: ${{ inputs.release-ref }}"
            exit 1
          fi
          echo "Input validation passed"

  release:
    needs: [pre-flight, validate-inputs]
    if: |
      !cancelled()
      && (needs.pre-flight.result == 'success' || needs.pre-flight.result == 'skipped')
      && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
      && (
        github.event_name == 'schedule'
        || github.event_name == 'push'
        || (github.event_name == 'workflow_dispatch' && inputs.component == 'nemo-evaluator')
      )
      && (
        github.event_name != 'push'
        || !(needs.pre-flight.outputs.docs_only == 'true' || needs.pre-flight.outputs.is_deployment_workflow == 'true')
      )
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_release_library.yml@b7091aadca729136b12c48d45b832633c681b131
    with:
      release-ref: ${{ github.event_name == 'schedule' && github.sha || inputs.release-ref || github.sha }}
      python-package: nemo_evaluator
      library-name: NeMo Evaluator
      validate-only: ${{ github.event_name == 'push' }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
      version-bump-branch: ${{ github.event_name == 'schedule' && 'main' || inputs.version-bump-branch || github.ref_name }}
      create-gh-release: ${{ github.event_name == 'schedule' && true || inputs.create-gh-release || true }}
      gh-release-tag-prefix: nemo-evaluator-
      gh-release-use-changelog-builder: true
      gh-release-changelog-included-paths: |
        packages/nemo-evaluator/
      publish-docs: false
      packaging: uv
      skip-test-wheel: true
      app-id: ${{ vars.BOT_ID }}
      has-src-dir: true
      root-dir: packages/nemo-evaluator
      restrict-to-admins: true
    secrets:
      TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
      TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
      SLACK_WEBHOOK_ADMIN: ${{ secrets.SLACK_WEBHOOK_ADMIN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_RELEASE_ENDPOINT }}
      PAT: ${{ secrets.PAT }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PWD: ${{ secrets.SSH_PWD }}
      BOT_KEY: ${{ secrets.BOT_KEY }}

  release-launcher:
    needs: [pre-flight, validate-inputs]
    if: |
      !cancelled()
      && (needs.pre-flight.result == 'success' || needs.pre-flight.result == 'skipped')
      && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')
      && (
        github.event_name == 'schedule'
        || github.event_name == 'push'
        || (github.event_name == 'workflow_dispatch' && inputs.component == 'nemo-evaluator-launcher')
      )
      && (
        github.event_name != 'push'
        || !(needs.pre-flight.outputs.docs_only == 'true' || needs.pre-flight.outputs.is_deployment_workflow == 'true')
      )
    uses: NVIDIA-NeMo/FW-CI-templates/.github/workflows/_release_library.yml@b7091aadca729136b12c48d45b832633c681b131
    with:
      release-ref: ${{ github.event_name == 'schedule' && github.sha || inputs.release-ref || github.sha }}
      python-package: nemo_evaluator_launcher
      library-name: NeMo Evaluator Launcher
      validate-only: ${{ github.event_name == 'push' }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
      version-bump-branch: ${{ github.event_name == 'schedule' && 'main' || inputs.version-bump-branch || github.ref_name }}
      create-gh-release: ${{ github.event_name == 'schedule' && true || inputs.create-gh-release || true }}
      gh-release-tag-prefix: nemo-evaluator-launcher-
      gh-release-use-changelog-builder: true
      gh-release-changelog-included-paths: |
        packages/nemo-evaluator-launcher/
      publish-docs: false
      packaging: uv
      skip-test-wheel: true
      app-id: ${{ vars.BOT_ID }}
      has-src-dir: true
      root-dir: packages/nemo-evaluator-launcher
      restrict-to-admins: true
    secrets:
      TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
      TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
      SLACK_WEBHOOK_ADMIN: ${{ secrets.SLACK_WEBHOOK_ADMIN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_RELEASE_ENDPOINT }}
      PAT: ${{ secrets.PAT }}
      SSH_KEY: ${{ secrets.SSH_KEY }}
      SSH_PWD: ${{ secrets.SSH_PWD }}
      BOT_KEY: ${{ secrets.BOT_KEY }}

  release-summary:
    needs: [pre-flight, validate-inputs, release, release-launcher]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED_JOBS=$(gh run view $GITHUB_RUN_ID --repo ${{ github.repository }} --json jobs --jq '[.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "action_required")] | length')

          if [ "${FAILED_JOBS:-0}" -eq 0 ]; then
              echo "✅ All previous jobs completed successfully"
              exit 0
          else
              echo "❌ Found $FAILED_JOBS failed job(s)"
              gh run view $GITHUB_RUN_ID --repo ${{ github.repository }} --json jobs --jq '.jobs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "action_required") | .name'
              exit 1
          fi
