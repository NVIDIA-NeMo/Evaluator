workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

default:
  image: python:3.12
  tags:
    - nv-core-evals-x86

stages:
  - lint
  - test
  - build
  - containers
  - multiarch
  - deploy
  - sonar

variables:
  REGISTRY: "${CI_REGISTRY_IMAGE}"

# ---------------------------------------------------------------------------
# Lint & Test
# ---------------------------------------------------------------------------

lint:
  stage: lint
  before_script:
    - pip install --quiet pre-commit
  script:
    - pre-commit run --all-files

test-offline:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - >-
      pytest tests/ -m "not network" -v --tb=short -x -n auto
      --junitxml=report-offline.xml
      --cov --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/(?i)total.*?(\d+(?:\.\d+)?\%)/'
  artifacts:
    paths:
      - coverage.xml
    reports:
      junit: report-offline.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always

test-network:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -m "network" -v --tb=short -x --junitxml=report-network.xml
  artifacts:
    reports:
      junit: report-network.xml
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------

build-docs:
  stage: build
  before_script:
    - pip install --quiet -r docs/requirements.txt
    - pip install --quiet -e ".[scoring]"
  script:
    - sphinx-build -b html docs docs/_build/html
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week

pages:
  stage: deploy
  dependencies:
    - build-docs
  script:
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Container builds
# ---------------------------------------------------------------------------

.container-build:
  stage: containers
  image: docker:27
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - TS=$(echo "$CI_COMMIT_TIMESTAMP" | sed 's/[-:]//g; s/T/-/; s/+.*//')
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export TAG="${CI_COMMIT_TAG}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        export TAG="${TS}-${CI_COMMIT_SHORT_SHA}"
      else
        export TAG="dev-${TS}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "TAG=${TAG} ARCH=${ARCH} COMPONENT=${COMPONENT}"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

container-build-base:
  extends: .container-build
  parallel:
    matrix:
      - ARCH: amd64
        RUNNER_TAG: nv-core-evals-x86
      - ARCH: arm64
        RUNNER_TAG: nv-core-evals-arm64-aws
  tags:
    - ${RUNNER_TAG}
  script:
    - DOCKERFILE="docker/Dockerfile.base"
    - IMAGE_TAG="${TAG}-${ARCH}"
    - docker pull "${REGISTRY}:latest-base-${ARCH}" || true
    - |
      BUILD_CMD="docker build --platform linux/${ARCH} --pull"
      BUILD_CMD="${BUILD_CMD} --cache-from ${REGISTRY}:latest-base-${ARCH}"
      BUILD_CMD="${BUILD_CMD} --tag ${REGISTRY}:${IMAGE_TAG}"
      BUILD_CMD="${BUILD_CMD} -f ${DOCKERFILE} ."
      eval $BUILD_CMD
    - docker push "${REGISTRY}:${IMAGE_TAG}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${REGISTRY}:${IMAGE_TAG}" "${REGISTRY}:latest-base-${ARCH}"
        docker push "${REGISTRY}:latest-base-${ARCH}"
      fi

container-build-components:
  extends: .container-build
  parallel:
    matrix:
      - ARCH: amd64
        COMPONENT: [harbor, lm-eval, skills, gym, full]
        RUNNER_TAG: nv-core-evals-x86
      - ARCH: arm64
        COMPONENT: [harbor, lm-eval, skills, gym, full]
        RUNNER_TAG: nv-core-evals-arm64-aws
  tags:
    - ${RUNNER_TAG}
  needs:
    - job: container-build-base
      parallel:
        matrix:
          - ARCH: amd64
            RUNNER_TAG: nv-core-evals-x86
          - ARCH: arm64
            RUNNER_TAG: nv-core-evals-arm64-aws
  script:
    - DOCKERFILE="docker/Dockerfile.${COMPONENT}"
    - IMAGE_TAG="${TAG}-${COMPONENT}-${ARCH}"
    - docker pull "${REGISTRY}:latest-${COMPONENT}-${ARCH}" || true
    - |
      BUILD_CMD="docker build --platform linux/${ARCH}"
      BUILD_CMD="${BUILD_CMD} --build-arg BASE_IMAGE=${REGISTRY}:${TAG}-${ARCH}"
      BUILD_CMD="${BUILD_CMD} --cache-from ${REGISTRY}:latest-${COMPONENT}-${ARCH}"
      BUILD_CMD="${BUILD_CMD} --tag ${REGISTRY}:${IMAGE_TAG}"
      BUILD_CMD="${BUILD_CMD} -f ${DOCKERFILE} ."
      eval $BUILD_CMD
    - docker push "${REGISTRY}:${IMAGE_TAG}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${REGISTRY}:${IMAGE_TAG}" "${REGISTRY}:latest-${COMPONENT}-${ARCH}"
        docker push "${REGISTRY}:latest-${COMPONENT}-${ARCH}"
      fi

multiarch-manifest-base:
  extends: .container-build
  stage: multiarch
  tags:
    - nv-core-evals-x86
  needs:
    - job: container-build-base
      artifacts: false
      parallel:
        matrix:
          - ARCH: amd64
            RUNNER_TAG: nv-core-evals-x86
          - ARCH: arm64
            RUNNER_TAG: nv-core-evals-arm64-aws
  script:
    - MANIFEST_TAG="${TAG}"
    - |
      # Pull architecture-specific base images
      docker pull "${REGISTRY}:${TAG}-amd64"
      docker pull "${REGISTRY}:${TAG}-arm64"
    - |
      # Create and push multiarch manifest for base
      docker manifest create "${REGISTRY}:${MANIFEST_TAG}" \
        --amend "${REGISTRY}:${TAG}-amd64" \
        --amend "${REGISTRY}:${TAG}-arm64"
    - docker manifest push "${REGISTRY}:${MANIFEST_TAG}"
    - |
      # Push 'latest' manifest for tagged releases
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create "${REGISTRY}:latest" \
          --amend "${REGISTRY}:latest-amd64" \
          --amend "${REGISTRY}:latest-arm64"
        docker manifest push "${REGISTRY}:latest"
      fi

multiarch-manifest-components:
  extends: .container-build
  stage: multiarch
  parallel:
    matrix:
      - COMPONENT: [harbor, lm-eval, skills, gym, full]
  tags:
    - nv-core-evals-x86
  needs:
    - job: container-build-components
  script:
    - MANIFEST_TAG="${TAG}-${COMPONENT}"
    - |
      # Pull architecture-specific component images
      docker pull "${REGISTRY}:${TAG}-${COMPONENT}-amd64"
      docker pull "${REGISTRY}:${TAG}-${COMPONENT}-arm64"
    - |
      # Create and push multiarch manifest for component
      docker manifest create "${REGISTRY}:${MANIFEST_TAG}" \
        --amend "${REGISTRY}:${TAG}-${COMPONENT}-amd64" \
        --amend "${REGISTRY}:${TAG}-${COMPONENT}-arm64"
    - docker manifest push "${REGISTRY}:${MANIFEST_TAG}"
    - |
      # Push 'latest' manifest for tagged releases
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker manifest create "${REGISTRY}:latest-${COMPONENT}" \
          --amend "${REGISTRY}:latest-${COMPONENT}-amd64" \
          --amend "${REGISTRY}:latest-${COMPONENT}-arm64"
        docker manifest push "${REGISTRY}:latest-${COMPONENT}"
      fi


push-nel-harbor-to-aws-ecr:
  stage: containers
  extends: .container-build
  variables:
    ARCH: amd64
  tags:
    - nv-core-evals-x86
  needs: ["container-build-components: [amd64, harbor, nv-core-evals-x86]"]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - TS=$(echo "$CI_COMMIT_TIMESTAMP" | sed 's/[-:]//g; s/T/-/; s/+.*//')
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export TAG="${CI_COMMIT_TAG}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        export TAG="${TS}-${CI_COMMIT_SHORT_SHA}"
      else
        export TAG="dev-${TS}-${CI_COMMIT_SHORT_SHA}"
      fi
    # Use amazon/aws-cli image via Docker to get ECR token — avoids install issues in docker:27
    - docker run --rm
        -e "AWS_ACCESS_KEY_ID=${ECR_AWS_ACCESS_KEY_ID}"
        -e "AWS_SECRET_ACCESS_KEY=${ECR_AWS_SECRET_ACCESS_KEY}"
        -e "AWS_DEFAULT_REGION=us-west-2"
        amazon/aws-cli ecr get-login-password --region us-west-2
        | docker login --username AWS --password-stdin
          463701203462.dkr.ecr.us-west-2.amazonaws.com
  script:
    - docker pull "${REGISTRY}:${TAG}-harbor-amd64"
    - docker tag "${REGISTRY}:${TAG}-harbor-amd64"
        "463701203462.dkr.ecr.us-west-2.amazonaws.com/harbor-us-west-2:oracle-test-nel-latest"
    - docker push
        "463701203462.dkr.ecr.us-west-2.amazonaws.com/harbor-us-west-2:oracle-test-nel-latest"
  variables:
    AWS_ACCESS_KEY_ID: $ECR_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $ECR_AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: us-west-2


# ---------------------------------------------------------------------------
# SonarQube
# ---------------------------------------------------------------------------

sonarqube:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs:
    - job: test-offline
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonar
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
