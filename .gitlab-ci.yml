workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

default:
  image: python:3.12
  tags:
    - nv-core-evals-x86

stages:
  - lint
  - test
  - build
  - containers
  - deploy

variables:
  REGISTRY: "${CI_REGISTRY_IMAGE}"

# ---------------------------------------------------------------------------
# Lint & Test
# ---------------------------------------------------------------------------

lint:
  stage: lint
  before_script:
    - pip install --quiet pre-commit
  script:
    - pre-commit run --all-files

test-offline:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -m "not network" -v --tb=short -x -n auto --junitxml=report-offline.xml
  artifacts:
    reports:
      junit: report-offline.xml
    when: always

test-network:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -m "network" -v --tb=short -x --junitxml=report-network.xml
  artifacts:
    reports:
      junit: report-network.xml
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------

build-docs:
  stage: build
  before_script:
    - pip install --quiet -r docs/requirements.txt
    - pip install --quiet -e ".[scoring]"
  script:
    - sphinx-build -b html docs docs/_build/html
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week

pages:
  stage: deploy
  dependencies:
    - build-docs
  script:
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Container builds
# ---------------------------------------------------------------------------

.container-build:
  stage: containers
  image: docker:27
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - TS=$(echo "$CI_COMMIT_TIMESTAMP" | sed 's/[-:]//g; s/T/-/; s/+.*//')
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export TAG="${CI_COMMIT_TAG}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        export TAG="${TS}-${CI_COMMIT_SHORT_SHA}"
      else
        export TAG="dev-${TS}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "TAG=${TAG} ARCH=${ARCH}"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.container-build-amd64:
  extends: .container-build
  tags:
    - nv-core-evals-x86
  variables:
    ARCH: amd64

.container-build-arm64:
  extends: .container-build
  tags:
    - nv-core-evals-arm64-aws
  variables:
    ARCH: arm64

# --- base ---

container-base-amd64:
  extends: .container-build-amd64
  script:
    - docker pull "${REGISTRY}:latest-amd64" || true
    - docker build --pull
      --platform linux/amd64
      --cache-from "${REGISTRY}:latest-amd64"
      --tag "${REGISTRY}:${TAG}-amd64"
      -f docker/Dockerfile.base .
    - docker push "${REGISTRY}:${TAG}-amd64"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${REGISTRY}:${TAG}-amd64" "${REGISTRY}:latest-amd64"
        docker push "${REGISTRY}:latest-amd64"
      fi

container-base-arm64:
  extends: .container-build-arm64
  script:
