default:
  image: python:3.11-slim
  tags:
    - nv-core-evals-x86

stages:
  - lint
  - test
  - build
  - containers
  - deploy

variables:
  REGISTRY: "${CI_REGISTRY_IMAGE}"

# ---------------------------------------------------------------------------
# Lint & Test
# ---------------------------------------------------------------------------

lint:
  stage: lint
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check src/ tests/
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - pyproject.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-offline:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -m "not network" -v --tb=short -x -n auto --junitxml=report-offline.xml
  artifacts:
    reports:
      junit: report-offline.xml
    when: always
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - pyproject.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-network:
  stage: test
  before_script:
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -m "network" -v --tb=short -x --junitxml=report-network.xml
  artifacts:
    reports:
      junit: report-network.xml
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------

build-docs:
  stage: build
  before_script:
    - pip install --quiet -r docs/requirements.txt
    - pip install --quiet -e ".[scoring]"
  script:
    - sphinx-build -b html docs docs/_build/html
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week
  rules:
    - changes:
        - docs/**/*
        - src/**/*
        - pyproject.toml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  dependencies:
    - build-docs
  script:
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Container builds
# ---------------------------------------------------------------------------

.container-build:
  stage: containers
  image: docker:27
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - TS=$(echo "$CI_COMMIT_TIMESTAMP" | sed 's/[-:]//g; s/T/-/; s/+.*//')
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export TAG="${CI_COMMIT_TAG}"
      elif [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        export TAG="${TS}-${CI_COMMIT_SHORT_SHA}"
      else
        export TAG="dev-${TS}-${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "TAG=${TAG}"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docker/**
        - src/**/*
        - pyproject.toml
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      changes:
        - docker/**
        - src/**/*
        - pyproject.toml

container-base:
  extends: .container-build
  script:
    - docker build --pull
      --cache-from "${REGISTRY}:latest"
      --tag "${REGISTRY}:${TAG}"
      -f docker/Dockerfile.base .
    - docker push "${REGISTRY}:${TAG}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${REGISTRY}:${TAG}" "${REGISTRY}:latest"
        docker push "${REGISTRY}:latest"
      fi

container-lm-eval:
  extends: .container-build
  needs: ["container-base"]
  script:
    - docker build
      --cache-from "${REGISTRY}:latest-lm-eval"
      --tag "${REGISTRY}:${TAG}-lm-eval"
      -f docker/Dockerfile.lm-eval .
    - docker push "${REGISTRY}:${TAG}-lm-eval"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${REGISTRY}:${TAG}-lm-eval" "${REGISTRY}:latest-lm-eval"
        docker push "${REGISTRY}:latest-lm-eval"
      fi

