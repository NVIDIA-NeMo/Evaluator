default:
  image: python:3.11-slim
  tags:
    - nv-core-evals-x86

stages:
  - lint
  - test
  - build
  - containers
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  REGISTRY: "${CI_REGISTRY_IMAGE}"
  TAG: "${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"

# ---------------------------------------------------------------------------
# Lint & Test
# ---------------------------------------------------------------------------

lint:
  stage: lint
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR ruff
  script:
    - ruff check src/ tests/
  cache:
    key: lint-pip
    paths:
      - .pip-cache/
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - pyproject.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-offline:
  stage: test
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[dev]"
  script:
    - pytest tests/ -m "not network" -v --tb=short --junitxml=report-offline.xml
  artifacts:
    reports:
      junit: report-offline.xml
    when: always
  cache:
    key: test-pip
    paths:
      - .pip-cache/
  rules:
    - changes:
        - src/**/*
        - tests/**/*
        - pyproject.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test-network:
  stage: test
  variables:
    HF_HOME: "$CI_PROJECT_DIR/.hf-cache"
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[dev]"
  script:
    - pytest tests/ -m "network" -v --tb=short --junitxml=report-network.xml
  artifacts:
    reports:
      junit: report-network.xml
    when: always
  cache:
    - key: test-pip
      paths:
        - .pip-cache/
    - key: hf-datasets
      paths:
        - .hf-cache/
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ---------------------------------------------------------------------------
# Docs
# ---------------------------------------------------------------------------

build-docs:
  stage: build
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR -r docs/requirements.txt
    - pip install --cache-dir $PIP_CACHE_DIR -e ".[scoring]"
  script:
    - sphinx-build -b html docs docs/_build/html
  artifacts:
    paths:
      - docs/_build/html
    expire_in: 1 week
  cache:
    key: docs-pip
    paths:
      - .pip-cache/
  rules:
    - changes:
        - docs/**/*
        - src/**/*
        - pyproject.toml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  dependencies:
    - build-docs
  script:
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Container builds (Pyxis/Enroot compatible)
# ---------------------------------------------------------------------------

.container-build:
  stage: containers
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile
        - docker/**
        - src/**/*
        - pyproject.toml

container-base:
  extends: .container-build
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${REGISTRY}:${TAG}"
      --destination "${REGISTRY}:latest"
      --cache=true
      --cache-repo="${REGISTRY}/cache"

container-lm-eval:
  extends: .container-build
  needs: ["container-base"]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.lm-eval"
      --destination "${REGISTRY}:${TAG}-lm-eval"
      --cache=true
      --cache-repo="${REGISTRY}/cache"

container-skills:
  extends: .container-build
  needs: ["container-base"]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.skills"
      --destination "${REGISTRY}:${TAG}-skills"
      --cache=true
      --cache-repo="${REGISTRY}/cache"

container-mteb:
  extends: .container-build
  needs: ["container-base"]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.mteb"
      --destination "${REGISTRY}:${TAG}-mteb"
      --cache=true
      --cache-repo="${REGISTRY}/cache"

container-full:
  extends: .container-build
  needs: ["container-base"]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.full"
      --destination "${REGISTRY}:${TAG}-full"
      --cache=true
      --cache-repo="${REGISTRY}/cache"
