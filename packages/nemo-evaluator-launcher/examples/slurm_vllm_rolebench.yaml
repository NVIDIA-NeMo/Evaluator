# RoleBench evaluation via SLURM with vLLM deployment.
#
# Prerequisites:
#   1. Clone OpenCompass:  git clone https://github.com/open-compass/opencompass.git /path/to/opencompass
#   2. Clone RoleBench dataset:  git clone https://huggingface.co/datasets/ZenMoore/RoleBench /path/to/RoleBench
#   3. Ensure both paths are accessible from SLURM compute nodes.
#
# How to use:
#   nemo-evaluator-launcher run --config slurm_vllm_rolebench.yaml \
#       -o execution.hostname=my-cluster.com \
#       -o execution.account=my-account \
#       -o execution.output_dir=/absolute/path/on/cluster
#
# Quick test with 10 samples:
#   Add: -o ++evaluation.nemo_evaluator_config.config.params.limit_samples=10

defaults:
  - execution: slurm/default
  - deployment: vllm
  - _self_

execution:
  hostname: ???
  username: ${oc.env:USER}
  account: ???
  output_dir: ???
  mounts:
    evaluation:
      /lustre: /lustre

deployment:
  checkpoint_path: null
  hf_model_handle: ???
  served_model_name: ???
  tensor_parallel_size: 8

evaluation:
  nemo_evaluator_config:
    config:
      params:
        parallelism: 16
        extra:
          opencompass_repo: ???   # Path to cloned OpenCompass repository
          rolebench_data: ???     # Path to cloned RoleBench dataset (ZenMoore/RoleBench)
          max_out_len: 512
  tasks:
    - name: rolebench.rolebench_instruction_eng
    - name: rolebench.rolebench_instruction_zh
    - name: rolebench.rolebench_role_eng
