# Chat/reasoning model evaluation configuration (chat endpoint)
# See docs: https://docs.nvidia.com/nemo/evaluator/latest/evaluation/run-evals/reasoning.html
evaluation:
  env_vars:
    HF_TOKEN: host:HF_TOKEN
  nemo_evaluator_config:
    config:
      params:
        request_timeout: 3600
        max_retries: 10
        parallelism: 16
        temperature: 1.0
        top_p: 0.95
        max_new_tokens: 131072
        extra:
          tokenizer: ???
          tokenizer_backend: huggingface
    target:
      api_endpoint:
        adapter_config:
          process_reasoning_traces: true # Strip reasoning tokens and collect stats
          # Older models use the system prompt to control reasoning.
          # use_system_prompt: true
          # Set to match your model, e.g. "/think" for Llama and Nemotron 2 or "detailed thinking on" for Nemotron 1
          # custom_system_prompt: ???
          # For newer models, use payload modifier instead.
          # Set to match your model e.g. `"chat_template_kwargs": {"enable_thinking": true}` for Nemotron 3.
          # Remove this field entirely for pure-chat models that do not expose a reasoning toggle.
          params_to_add: ???
