# Each slurm cluster has its own flavour, below we provide some defaults that might meet one's needs.
type: slurm # Executor is chosen based on this field
hostname: ??? # SLURM headnode (login) hostname (required)
username: ${oc.env:USER} # Defaults to $USER env var
account: ??? # SLURM account allocation (required)
output_dir: ??? # Absolute path accessible on compute nodes (required)
partition: batch
cpu_partition: null  # CPU-only partition for export jobs. Falls back to execution.partition when null.
num_nodes: 1             # Total SLURM nodes (num_nodes_per_instance = num_nodes / num_instances)
num_instances: 1         # Number of independent deployment instances
ntasks_per_node: 1
gres: gpu:8
walltime: 01:00:00
max_walltime: "120:00:00" # Maximum total runtime across all resumes. Set to null for unlimited.
endpoint_readiness_timeout: null
subproject: nemo-evaluator-launcher
sbatch_comment: null # Optional comment for SLURM job (translates to #SBATCH --comment='...')
sbatch_extra_flags: # Extra #SBATCH flags as key-value pairs (e.g. {switches: 1, constraint: h100}). String values with spaces are automatically quoted. Use true/false for boolean flags, null to omit a flag.
  exclusive: true  # Request exclusive node access; set to false to allow node sharing

# Deployment-specific SLURM configuration
deployment:
  n_tasks: ${execution.num_nodes}  # total deployment srun tasks across all instances; executor divides by num_instances per srun. Override if your deployment requires more tasks per node (e.g. ntasks_per_node > 1).

mounts:
  deployment: {}
  evaluation: {}
  auxiliary: {}  # keyed by auxiliary deployment name, e.g. auxiliary.judge: {/host/path: /container/path}
  mount_home: true

proxy:
  type: haproxy
  image: haproxy:latest
  config:
    haproxy_port: 5009
    health_check_path: /health
    health_check_status: 200

# Eval-only multi-node Ray cluster. Active only when deployment.type == "none"
# AND num_nodes > 1 AND eval_ray_cluster == true. Aux deployments are rejected
# in combination with eval_ray_cluster=true.
eval_ray_cluster: false        # Opt in to spread eval Ray actors across all allocated nodes.
eval_ray_port: 6379            # Ray GCS port on the head node.
eval_ray_dashboard_port: 8265  # Ray dashboard port.
eval_ray_ready_timeout: 600    # Seconds to wait for all N Ray daemons to join.
eval_per_node_pre_cmd: null    # Optional bash snippet run on every node inside the
                               # eval container before `ray start` (e.g. install
                               # apptainer / squashfuse). When set, requires
                               # NEMO_EVALUATOR_TRUST_PRE_CMD=1.
eval_ray_pre_start_cmd: null   # Optional bash snippet prepended to each `ray start`
                               # (head + workers) and `ray status` wait handler. Use
                               # to put `ray` on PATH when the eval container ships
                               # it inside a venv (e.g. Gym: `source /opt/Gym/.venv/bin/activate`).
eval_ray_head_workload_cmd: null  # Optional bash snippet that REPLACES `sleep infinity`
                                  # in the ray-head's inner_cmd, so the head's bootstrap
                                  # container runs the actual workload (e.g. bash a
                                  # lustre-rendezvous deployment script that invokes
                                  # ng_e2e_collect_rollouts). Driver + Ray actors then
                                  # share one venv → eliminates pickle-ABI skew. Mirror
                                  # canonical vllm_ray pre_cmd's lustre-rendezvous pattern.
                                  # When unset, head stays `sleep infinity`.
