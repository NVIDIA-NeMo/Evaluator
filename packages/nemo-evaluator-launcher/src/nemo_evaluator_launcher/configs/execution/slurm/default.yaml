# Each slurm cluster has its own flavour, below we provide some defaults that might meet one's needs.
type: slurm # Executor is chosen based on this field
hostname: ??? # SLURM headnode (login) hostname (required)
username: ${oc.env:USER} # Defaults to $USER env var
account: ??? # SLURM account allocation (required)
output_dir: ??? # Absolute path accessible on compute nodes (required)
partition: batch
num_nodes: 1             # Total SLURM nodes (num_nodes_per_instance = num_nodes / num_instances)
num_instances: 1         # Number of independent deployment instances
ntasks_per_node: 1
gres: gpu:8
walltime: 01:00:00
max_walltime: "120:00:00" # Maximum total runtime across all resumes. Set to null for unlimited.
endpoint_readiness_timeout: null
subproject: nemo-evaluator-launcher
sbatch_comment: null # Optional comment for SLURM job (translates to #SBATCH --comment='...')
sbatch_extra_flags: # Extra #SBATCH flags as key-value pairs (e.g. {switches: 1, constraint: h100}). String values with spaces are automatically quoted. Use true/false for boolean flags, null to omit a flag.
  exclusive: true  # Request exclusive node access; set to false to allow node sharing

# Deployment-specific SLURM configuration
deployment:
  n_tasks: ${execution.num_nodes}  # total deployment srun tasks across all instances; executor divides by num_instances per srun. Override if your deployment requires more tasks per node (e.g. ntasks_per_node > 1).

mounts:
  deployment: {}
  evaluation: {}
  mount_home: true

proxy:
  type: haproxy
  image: haproxy:latest
  config:
    haproxy_port: 5009
    health_check_path: /health
    health_check_status: 200
