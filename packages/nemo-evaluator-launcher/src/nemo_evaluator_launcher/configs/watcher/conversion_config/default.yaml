# Docker image (.sqsh or registry URI) used to run the conversion job on the cluster.
container: ???

# Directories to bind-mount into the container in addition to the automatically
# added input (read-only) and output checkpoint paths.
# Each entry must have both 'source' (host path) and 'target' (container path).
mounts: []
# mounts:
#   - source: /host/path/to/weights
#     target: /container/path/to/weights

# Extra key-value pairs exposed as Jinja2 variables inside command_pattern.
# These supplement the built-in {{ input_path }} and {{ output_path }} variables.
command_params: {}
# command_params:
#   tp: 1       # tensor parallelism
#   pp: 1       # pipeline parallelism
#   ep: 1       # expert parallelism
#   etp: 1      # expert tensor parallelism
#   hf_model: ???  # path to reference HF model weights / config

# Jinja2 template for the command executed inside the container.
# Required placeholders: {{ input_path }} (source checkpoint), {{ output_path }} (converted output).
# All keys from command_params are available as additional Jinja2 variables.
command_pattern: ???
# Example:
# command_pattern: >-
#   bash -lc '
#   python /opt/converter/convert.py
#   --input {{ input_path }}
#   --output {{ output_path }}'
