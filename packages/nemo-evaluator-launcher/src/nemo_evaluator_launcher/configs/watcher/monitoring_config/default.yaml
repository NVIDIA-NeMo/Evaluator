# MonitoringConfig template — controls how nel-watch scans for new checkpoints.
#
# Usage in your watch config:
#   defaults:
#     - monitoring_config: default
#     - _self_

# Directories to scan for new checkpoint subdirectories.
# Use absolute paths
directories:
  - ???

# Polling interval in seconds between directory scans.
# Set to null to scan once and exit
interval: 300

# Glob patterns for checkpoint subdirectory names.
# Only subdirectories whose names match ANY pattern are considered.
checkpoint_patterns:
  - "iter_*"
  - "step_*"

# A checkpoint subdirectory is considered ready when ANY of these files exist
# inside it. Extend this list if your training framework writes a different
# sentinel file.
ready_markers:
  - metadata.json
  - config.yaml
  - config.json

# Processing order for newly discovered checkpoints, sorted by directory name.
# 'last'  — highest name first (e.g. step_10000 before step_1000)
# 'first' — lowest name first
order: last
