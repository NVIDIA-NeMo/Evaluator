type: vllm
image: vllm/vllm-openai:latest
checkpoint_path: ???
served_model_name: ???
port: 8002
tensor_parallel_size: 8
pipeline_parallel_size: 1
data_parallel_size: 1
gpu_memory_utilization: 0.95
extra_args: ""
env_vars: {} # {name: value} dict
num_nodes: 1

endpoints:
  chat: /v1/chat/completions
  completions: /v1/completions
  health: /health

command: vllm serve ${oc.select:user_deployment.hf_model_handle,/checkpoint}
  --tensor-parallel-size=${user_deployment.tensor_parallel_size}
  --pipeline-parallel-size=${user_deployment.pipeline_parallel_size}
  --data-parallel-size=${user_deployment.data_parallel_size}
  --port ${user_deployment.port}
  --trust-remote-code
  --served-model-name ${user_deployment.served_model_name}
  --gpu-memory-utilization ${user_deployment.gpu_memory_utilization}
  ${user_deployment.extra_args}
