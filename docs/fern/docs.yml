instances:
  - url: evaluator.docs.buildwithfern.com/nemo/evaluator
    custom-domain: docs.nvidia.com/nemo/evaluator

title: NVIDIA NeMo Evaluator

global-theme: nvidia

logo:
  href: /nemo/evaluator/nightly
  right-text: NeMo Evaluator

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Evaluator

experimental:
  mdx-components:
    - ./components

versions:
  - display-name: nightly
    path: versions/nightly.yml
    slug: nightly

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "/nemo/evaluator/index.html"
    destination: "/nemo/evaluator/nightly"
  - source: "/nemo/evaluator/index"
    destination: "/nemo/evaluator/nightly"
  - source: "/nemo/evaluator/nightly/:path*/index.html"
    destination: "/nemo/evaluator/nightly/:path*"
  - source: "/nemo/evaluator/:path*/index.html"
    destination: "/nemo/evaluator/:path*"
  # Sphinx page URLs (foo.html); must follow all :path*/index.html rules above
  - source: "/nemo/evaluator/:path*.html"
    destination: "/nemo/evaluator/:path*"
