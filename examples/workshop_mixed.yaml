model:
  url: ${NEMO_MODEL_URL}
  id: ${NEMO_MODEL_ID}
  api_key: ${NEMO_API_KEY:-}

benchmarks:
  - name: gsm8k                   # built-in (numeric_match)
    max_problems: 10
  - name: ./examples/workshop_trivia.py    # BYOB file (fuzzy_match)
    repeats: 2
  - name: lm-eval://ifeval        # lm-evaluation-harness
    max_problems: 10

output:
  dir: ./results/02_mixed
  report: [markdown, html]
