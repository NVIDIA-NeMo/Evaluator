# Flavor: SLURM + vLLM + Gym agent runtime + Apptainer sandbox (het-group)
# vLLM serves the model on GPU nodes. The gym server runs agents.
# nel verifies patches inside Apptainer containers on separate CPU nodes.
#
# Prerequisites:
#   - Access to a SLURM cluster with GPU and CPU partitions
#   - Apptainer >= 1.1 on all nodes
#   - Shared filesystem (e.g. /lustre, /nfs) for SIF cache + staging
#   - Model weights accessible on shared filesystem
#   - nemo-gym server reachable from cluster nodes
# Run: nel eval run examples/configs/20a_slurm_gym_runtime_apptainer.yaml

services:
  model:
    type: vllm
    model: nvidia/Llama-3.1-70B-Instruct
    protocol: chat_completions
    tensor_parallel_size: 4
    port: 8000
    node_pool: gpu

  gym:
    type: gym
    url: http://gym-server:8000

sandboxes:
  verify:
    type: apptainer
    node_pool: sandbox_cpu
    sif_cache_dir: /shared/nel_sif_cache
    concurrency: 8
    slots_per_node: 4
    timeout: 1800.0

benchmarks:
  - name: swebench-multilingual
    max_problems: 10
    solver:
      type: gym_delegation
      service: model
      gym_service: gym
      gym_agent: openhands
      trust_reward: false
    sandbox: verify

cluster:
  type: slurm
  walltime: "04:00:00"
  node_pools:
    gpu:
      partition: gpu
      nodes: 1
      gres: "gpu:4"
    sandbox_cpu:
      partition: cpu
      nodes: 2
