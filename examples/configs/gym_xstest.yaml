# XSTest: safety over-refusal evaluation via native Gym server.
#
# XSTest checks whether a model refuses safe prompts (over-refusal).
# It supports both string-matching and LLM-judge classification.
# This config uses string-matching mode (no judge) for simplicity.
#
# Prerequisites:
#   - Gym repo cloned and set up
#   - A model endpoint running
#
# Usage:
#   nel eval run examples/configs/gym_xstest.yaml

services:
  xstest:
    type: gym
    server_cmd: >-
      cd ${GYM_PATH:-/opt/Gym}
      && python resources_servers/xstest/app.py --port 9101
    port: 9101
    startup_timeout: 60
  model:
    type: api
    url: ${NEMO_MODEL_URL}
    model: ${NEMO_MODEL_ID}
    api_key: ${NEMO_API_KEY:-}

benchmarks:
  - name: gym://localhost:9101?protocol=native&data=${GYM_PATH:-/opt/Gym}/resources_servers/xstest/data/example.jsonl
    model: model
    max_problems: 10
    max_concurrent: 16

output:
  dir: ./results/gym_xstest
  report: [markdown, html]
