# Multi-benchmark evaluation: runs all tasks sequentially, separate output dirs.
#
# Usage:
#   nel eval run examples/configs/multi_benchmark.yaml

model:
  url: ${NEMO_MODEL_URL}
  id: ${NEMO_MODEL_ID}

benchmarks:
  - name: gsm8k
    repeats: 2
    max_problems: 50
    system_prompt: "Solve step by step. Put your final answer in \\boxed{}."

  - name: triviaqa
    repeats: 1
    max_problems: 50
