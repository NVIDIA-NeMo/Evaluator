# PinchBench + OpenClaw, solver = GPT-5.4 via NVIDIA inference gateway.
# Local run (no SLURM). Requires NVIDIA_API_KEY and AWS credentials for
# the ECS Fargate sandbox.

services:
  model:
    type: api
    url: https://inference-api.nvidia.com/v1/chat/completions
    protocol: chat_completions
    model: openai/openai/gpt-5.4
    api_key: ${ANTHROPIC_API_KEY}
    proxy:
      verbose: true
      extra_body:
        reasoning_effort: medium
      interceptors:
        - name: turn_counter

  judge:
    type: api
    url: https://inference-api.nvidia.com/v1/chat/completions
    protocol: chat_completions
    model: aws/anthropic/claude-opus-4-5
    api_key: ${ANTHROPIC_API_KEY}
    generation:
      temperature: 0.0
      max_tokens: 2048

benchmarks:
  - playbook: pinchbench
    repeats: 1
    max_concurrent: 20
    sandbox:
      region: us-west-2
      concurrency: 20
