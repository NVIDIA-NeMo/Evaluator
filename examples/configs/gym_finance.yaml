# Finance SEC Search: SEC EDGAR filing analysis via native Gym server.
#
# This is an agentic benchmark -- the Gym resource server provides
# tool-use capabilities (SEC filing search, document retrieval, parsing).
# The model interacts with these tools to answer financial questions.
#
# Prerequisites:
#   - nemo-evaluator:gym container (docker build -f docker/Dockerfile.gym), or
#     Gym repo cloned and set up
#   - A model endpoint running
#   - Optional: Tavily API key for web search augmentation
#
# Usage:
#   nel eval run examples/configs/gym_finance.yaml

services:
  finance:
    type: gym
    server_cmd: >-
      cd ${GYM_PATH:-/opt/Gym}
      && python resources_servers/finance_sec_search/app.py --port 9102
    port: 9102
    startup_timeout: 120
  model:
    type: api
    url: ${NEMO_MODEL_URL}
    model: ${NEMO_MODEL_ID}
    api_key: ${NEMO_API_KEY:-}

benchmarks:
  - name: gym://localhost:9102?protocol=native&data=${GYM_PATH:-/opt/Gym}/resources_servers/finance_sec_search/data/example.jsonl
    model: model
    max_problems: 5
    max_concurrent: 4

output:
  dir: ./results/gym_finance
  report: [markdown, html]
