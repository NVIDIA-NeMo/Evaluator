# Single-benchmark evaluation config.
#
# Usage:
#   nel run examples/configs/single_benchmark.yaml
#   nel run examples/configs/single_benchmark.yaml --api-key YOUR_KEY

evaluation:
  # Set these to your model endpoint, or use env vars NEMO_MODEL_URL / NEMO_MODEL_ID
  model_url: ${NEMO_MODEL_URL}
  model_id: ${NEMO_MODEL_ID}

  tasks:
    - benchmark: gsm8k
      repeats: 2
      max_problems: 20
      scoring: math_equal

  output:
    dir: ./eval_results
    formats: [json, jsonl]
