# Single-benchmark evaluation config.
#
# Usage:
#   nel eval run examples/configs/single_benchmark.yaml
#   nel eval run examples/configs/single_benchmark.yaml --api-key YOUR_KEY

model:
  url: ${NEMO_MODEL_URL}
  id: ${NEMO_MODEL_ID}

benchmarks:
  - name: gsm8k
    repeats: 2
    max_problems: 20

output:
  dir: ./eval_results
