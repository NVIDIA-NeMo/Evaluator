# OpenClaw agent evaluation: PinchBench (Docker) with Claude Opus 4.6 as judge
#
# Sampling params (temperature, top_p) aligned with internal reference:
#   slurm_nemotron-super-v3_lax_pinchbench.yaml
#
# Prerequisites:
#   1. Docker running
#   2. export NVIDIA_API_KEY="nvapi-..."
#   3. export JUDGE_API_KEY="sk-..."
#
# Run:
#   nel eval run examples/configs/openclaw_pinchbench.yaml
#
# To sideload a fully custom openclaw.json instead of auto-generating one:
#   openclaw_config: path/to/my/openclaw.json

services:
  openclaw_model:
    type: api
    url: https://integrate.api.nvidia.com/v1
    model: nvidia/nemotron-3-super-120b-a12b
    api_key: ${NVIDIA_API_KEY}

  judge:
    type: api
    url: https://inference-api.nvidia.com/v1
    model: aws/anthropic/bedrock-claude-opus-4-6
    api_key: ${JUDGE_API_KEY}

benchmarks:
  - name: pinchbench
    model: openclaw_model
    judge: judge
    endpoint_type: openclaw
    repeats: 5
    max_concurrent: 30
    temperature: 1.0
    top_p: 0.95
    context_window: 131072
    sandbox:
      backend: docker
      image: ghcr.io/openclaw/openclaw:latest
      timeout: 14400
      memory: 4g
      cpus: 2

output:
  dir: ./results/openclaw_eval
  report: [markdown]
