# Flavor: SLURM + vLLM + Gym as agent runtime + SLURM sandbox (Mode A)
# vLLM serves the model on the cluster. The gym server runs the agent.
# nel verifies patches inside Pyxis/Enroot containers on sandbox nodes.
#
# Prerequisites:
#   - Access to a SLURM cluster with GPU nodes
#   - Pyxis/Enroot configured for container execution
#   - Model weights accessible on shared filesystem
#   - nemo-gym server reachable from cluster nodes
# Run: nel eval run examples/configs/20_slurm_gym_runtime.yaml

services:
  model:
    type: vllm
    model: nvidia/Llama-3.1-70B-Instruct
    protocol: chat_completions
    tensor_parallel_size: 4
    port: 8000
    node_pool: gpu

  gym:
    type: gym
    url: http://gym-server:8000

sandboxes:
  verify:
    type: slurm
    node_pool: sandbox
    concurrency: 4
    slots_per_node: 4
    timeout: 1800.0

benchmarks:
  - name: swebench-multilingual
    max_problems: 10
    solver:
      type: gym_delegation
      service: model
      gym_service: gym
      gym_agent: openhands
      trust_reward: false
    sandbox: verify

cluster:
  type: slurm
  walltime: "04:00:00"
  node_pools:
    gpu:
      partition: batch
      nodes: 1
      ntasks_per_node: 1
      gres: "gpu:4"
    sandbox:
      partition: batch
      nodes: 2
