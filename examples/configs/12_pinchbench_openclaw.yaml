# PinchBench + OpenClaw solver + ECS Fargate sandbox.
# Requires NVIDIA_API_KEY (solver), ANTHROPIC_API_KEY (judge), and AWS
# credentials. ECS infra auto-discovered from SSM.

services:
  model:
    type: api
    url: https://integrate.api.nvidia.com/v1/chat/completions
    protocol: chat_completions
    model: nvidia/nemotron-3-super-120b-a12b
    api_key: ${NVIDIA_API_KEY}
    proxy:
      verbose: true
      interceptors:
        - name: turn_counter
        - name: reasoning_replay

  judge:
    type: api
    url: https://inference-api.nvidia.com/v1/chat/completions
    protocol: chat_completions
    model: aws/anthropic/claude-opus-4-5
    api_key: ${ANTHROPIC_API_KEY}
    generation:
      temperature: 0.0
      max_tokens: 2048

benchmarks:
  - playbook: pinchbench
    max_problems: 3
    max_concurrent: 3
    sandbox:
      region: us-west-2
      concurrency: 3
