# Flavor: Agentic benchmark (PinchBench) + OpenClaw solver + ECS sandbox
# Tasks with embedded grading code are scored automatically; the rest
# fall through to LLM-as-judge.
#
# Prerequisites:
#   - NVIDIA_API_KEY set in environment
#   - AWS credentials configured (IAM role or env vars)
#   - ECS cluster, subnets, security groups, and SSH key pair in Secrets Manager
# Run: nel eval run examples/configs/12_pinchbench_openclaw.yaml

services:
  nemotron:
    type: api
    url: https://integrate.api.nvidia.com/v1/chat/completions
    protocol: chat_completions
    model: nvidia/nemotron-3-super-120b-a12b
    api_key: ${NVIDIA_API_KEY}
    proxy_verbose: true
    interceptors:
      - name: turn_counter

benchmarks:
  - name: pinchbench
    max_problems: 3
    timeout: 900.0
    max_concurrent: 3
    solver:
      type: openclaw
      service: nemotron
    sandbox:
      type: ecs_fargate
      image: ghcr.io/openclaw/openclaw
      timeout: 900.0
      concurrency: 3
      region: us-west-2
      cluster: harbor-cluster
      subnets:
        - subnet-0ac852ca0a783a332
        - subnet-0500dcb4c191d93a8
      security_groups:
        - sg-035f677c8d037013c
      assign_public_ip: true
      execution_role_arn: "arn:aws:iam::463701203462:role/harbor-ecs-execution"
      task_role_arn: "arn:aws:iam::463701203462:role/harbor-ecs-task"
      log_group: "/ecs/harbor/us-west-2"
      log_stream_prefix: pinchbench
      cpu: "2048"
      memory: "4096"
      s3_bucket: "harbor-staging-20260210135420899800000003"
      ssh_sidecar:
        sshd_port: 2222
        ssh_ready_timeout_sec: 120
        public_key_secret_arn: "arn:aws:secretsmanager:us-west-2:463701203462:secret:harbor-ssh-tunnel-pubkey-us-west-2-pcm7ZZ"
        private_key_secret_arn: "arn:aws:secretsmanager:us-west-2:463701203462:secret:harbor-ssh-tunnel-privkey-us-west-2-d3G7CV"
