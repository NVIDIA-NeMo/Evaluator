# Flavor: Multi-benchmark suite in a single run (RFC Story 2)
# Runs multiple benchmarks of different types in one evaluation,
# producing a unified cross-benchmark report.
#
# Prerequisites:
#   - NVIDIA_API_KEY set in environment
#   - Docker running locally (for humaneval code sandbox)
# Run: nel eval run examples/configs/17_suite_release.yaml

model:
  url: https://integrate.api.nvidia.com/v1
  id: nvidia/nemotron-3-super-120b-a12b
  api_key: ${NVIDIA_API_KEY}

benchmarks:
  - name: gsm8k
    max_problems: 5
    endpoint_type: chat

  - name: mmlu
    max_problems: 5
    endpoint_type: chat

  - name: humaneval
    max_problems: 5
    endpoint_type: chat
    sandbox:
      backend: docker
      image: python:3.12-slim
      timeout: 60.0

  - name: simpleqa
    max_problems: 5
    endpoint_type: chat
