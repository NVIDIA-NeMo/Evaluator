# Gym evaluation suite on SLURM: Spider2, XSTest, Finance.
#
# Runs three native Gym resource servers as managed services and evaluates
# a model against all three.  Each server is an opaque process started via
# server_cmd -- NEL doesn't care about their internals.
#
# Usage:
#   nel eval run examples/configs/gym_slurm_suite.yaml --submit
#
# Environment variables:
#   GYM_PATH      Path to the Gym repo (default: /opt/Gym)
#   NEMO_MODEL_URL   Model endpoint URL
#   NEMO_MODEL_ID    Model name
#   NEMO_API_KEY     API key (optional)

services:
  spider2:
    type: gym
    server_cmd: >-
      cd ${GYM_PATH:-/opt/Gym}
      && python resources_servers/spider2_lite/app.py --port 9100
    port: 9100
    startup_timeout: 120
  xstest:
    type: gym
    server_cmd: >-
      cd ${GYM_PATH:-/opt/Gym}
      && python resources_servers/xstest/app.py --port 9101
    port: 9101
    startup_timeout: 60
  finance:
    type: gym
    server_cmd: >-
      cd ${GYM_PATH:-/opt/Gym}
      && python resources_servers/finance_sec_search/app.py --port 9102
    port: 9102
    startup_timeout: 120
  model:
    type: api
    url: ${NEMO_MODEL_URL}
    model: ${NEMO_MODEL_ID}
    api_key: ${NEMO_API_KEY:-}

benchmarks:
  - name: gym://localhost:9100?protocol=native&data=${GYM_PATH:-/opt/Gym}/resources_servers/spider2_lite/data/spider2_lite_sqlite_validation.jsonl
    model: model
    max_problems: 135
    max_concurrent: 32
    repeats: 1
  - name: gym://localhost:9101?protocol=native&data=${GYM_PATH:-/opt/Gym}/resources_servers/xstest/data/example.jsonl
    model: model
    max_concurrent: 16
    repeats: 1
  - name: gym://localhost:9102?protocol=native&data=${GYM_PATH:-/opt/Gym}/resources_servers/finance_sec_search/data/example.jsonl
    model: model
    max_problems: 20
    max_concurrent: 4
    repeats: 1

cluster:
  type: slurm
  partition: batch
  nodes: 1
  gres: gpu:0
  walltime: "02:00:00"
  auto_resume: true

output:
  dir: ./results/gym_slurm_suite
  report: [markdown, html]
