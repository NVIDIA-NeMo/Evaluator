# Comprehensive evaluation of Qwen3.5-9B on SLURM
#
# Usage:
#   nel eval run examples/configs/suite_qwen35_9b.yaml --dry-run     # generate scripts
#   nel eval run examples/configs/suite_qwen35_9b.yaml --submit      # submit via SSH
#   nel eval status -o ./eval_results/qwen3.5-9b                     # check status
#   nel eval report ./eval_results/qwen3.5-9b --all-formats          # generate reports

services:
  evaluated:
    type: vllm
    model: Qwen/Qwen3.5-9B
    tensor_parallel_size: 8
    port: 8000
    extra_args:
      - "--max-model-len"
      - "32768"

  swebench_gym:
    type: gym
    benchmark: swebench
    port: 9090

benchmarks:
  - name: skills://mmlu-pro
    model: evaluated
    repeats: 5
    system_prompt: >-
      Please show your choice in the `answer` field with only the choice letter,
      e.g., "answer": "C".

  - name: lm-eval/aime2025
    model: evaluated
    repeats: 20
    system_prompt: >-
      Please reason step by step, and put your final answer within \boxed{}.

  - name: gym://localhost:9090
    model: evaluated
    repeats: 1

cluster:
  type: slurm
  hostname: cw-dfw-cs-001-login-01
  username: ${USER}
  account: nv-eval
  partition: batch
  nodes: 1
  ntasks_per_node: 1
  gres: "gpu:8"
  walltime: "01:00:00"
  subproject: nv-eval

output:
  dir: ./eval_results/qwen3.5-9b
  report:
    - html
    - markdown
    - csv
    - json
    - latex
