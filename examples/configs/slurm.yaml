# SLURM cluster evaluation config.
#
# Usage:
#   nel eval run examples/configs/slurm.yaml --submit

model:
  url: ${NEMO_MODEL_URL}
  id: ${NEMO_MODEL_ID}

benchmarks:
  - name: gsm8k
    repeats: 5
    system_prompt: "Solve step by step. Put your final answer in \\boxed{}."

cluster:
  type: slurm
  partition: batch
  gres: gpu:8
  walltime: "02:00:00"
  conda_env: gym

output:
  dir: ./eval_results/gsm8k_distributed
