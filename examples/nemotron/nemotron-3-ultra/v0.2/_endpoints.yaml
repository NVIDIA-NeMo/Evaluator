# Shared endpoint configuration — include via: defaults: [_endpoints, _self_]
# Merges at config root (no @-redirection; NEL has no 'target' config group).
#
# ─── POLICY MODEL (the model under test) ─────────────────────────────────────
# Fill in url and model_id below before running. The API key is read from the
# INFERENCE_API_KEY env var (set it in your .env).
#
# Examples:
#   NVCF (hosted):
#     url:      https://integrate.api.nvidia.com/v1/chat/completions
#     model_id: nvidia/nemotron-ultra-v3-550b
#   Local vLLM / SGLang:
#     url:      http://localhost:8000/v1/chat/completions
#     model_id: <served_model_name>

target:
  api_endpoint:
    url: "https://integrate.api.nvidia.com/v1/chat/completions"
    model_id: "nvidia/nemotron-3-ultra-550b-a55b"
    api_key_name: INFERENCE_API_KEY
    type: chat

# ─── JUDGES & SIMULATORS ─────────────────────────────────────────────────────
# One block per external model role. Fill in base_url + model for your judge
# provider; each block reads its own api_key env var so they can be credentialed
# independently.
#   base_url: https://api.openai.com/v1   model: gpt-4o   (example)

# Tau2: plays the customer role in the Tau2 conversation simulator.
# Used: GPT-5.2.   Env var: TAU2_SIMULATOR_API_KEY
tau2_simulator:
  base_url: "<judge-base-url>"   # e.g. https://api.openai.com/v1
  model: "<judge-model>"          # e.g. gpt-4o
  api_key: $TAU2_SIMULATOR_API_KEY

# GDPVal: pairwise judge for GDPVal Stirrup scoring.
# Used: Gemini 3.1 Pro.   Env var: GDPVAL_JUDGE_API_KEY
gdpval_judge:
  base_url: "<judge-base-url>"   # e.g. https://api.openai.com/v1
  model: "<judge-model>"          # e.g. gpt-4o
  api_key: $GDPVAL_JUDGE_API_KEY

# HLE-AA: strict judge for Humanity's Last Exam.
# Used: gpt-4o.   Env var: JUDGE_API_KEY
hle_judge:
  base_url: "<judge-base-url>"   # e.g. https://api.openai.com/v1
  model: gpt-4o
  api_key: $JUDGE_API_KEY

# AA-Omniscience: knowledge / hallucination judge.
# Used: gemini-3-flash-preview (provider id may be e.g. gcp/google/gemini-3-flash-preview).
# Env var: GEMINI_API_KEY
omniscience_judge:
  base_url: "<judge-base-url>"
  model: gemini-3-flash-preview
  api_key: $GEMINI_API_KEY
