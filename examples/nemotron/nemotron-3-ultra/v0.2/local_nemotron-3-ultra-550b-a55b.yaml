# This configuration file is for the NVIDIA Nemotron 3 Ultra 550B A55B model.
# Nemotron 3 Ultra is available on build.nvidia.com via https://build.nvidia.com/nvidia/nemotron-3-ultra-550b-a55b
# Until then, point target.api_endpoint.url at your self-hosted vLLM endpoint.
# If you prefer to deploy the model on your own infrastructure, use the following deployment setup:

### 1. NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 ###
# - Topology: 2 nodes × 4 GPUs, TP=8 across nodes via Ray
# - Container: Nemotron Ultra compatible vLLM
# - Mount ultra_v3_reasoning_parser.py at $MODEL_DIR/ultra_v3_reasoning_parser.py
# - Environment Variables:
#       - VLLM_ALLOW_LONG_MAX_MODEL_LEN: 0
#       - VLLM_CACHE_ROOT: /cache/vllm
#       - VLLM_ENGINE_READY_TIMEOUT_S: 3600
#       - RAY_raylet_start_wait_time_s: 120
#       - VLLM_FLASHINFER_ALLREDUCE_BACKEND: trtllm
#       - VLLM_ALLREDUCE_USE_SYMM_MEM: 0
#       - NCCL_MNNVL_ENABLE: 0
#       - FLASHINFER_WORKSPACE_BASE: /tmp
#       - VLLM_USE_FLASHINFER_MOE_FP16: 1
#       - VLLM_FLASHINFER_MOE_BACKEND: latency
#       - VLLM_USE_RAY_COMPILED_DAG_CHANNEL_TYPE: shm
# - vLLM command: vllm serve nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 --tensor-parallel-size=8
#     --pipeline-parallel-size=1 --data-parallel-size=1 --port 8000 --trust-remote-code
#     --served-model-name nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 --gpu-memory-utilization 0.85
#     --enable-prefix-caching --enable-chunked-prefill --enable-log-requests --enable-auto-tool-choice
#     --tool-call-parser qwen3_coder --reasoning-parser-plugin $MODEL_DIR/ultra_v3_reasoning_parser.py
#     --reasoning-parser ultra_v3 --kv-cache-dtype fp8 --enable-expert-parallel --max-num-seqs 256
#     --mamba-cache-mode align --model-loader-extra-config
#     ''{"enable_multithread_load": true, "num_threads": 96}'' --compilation-config
#     ''{"pass_config": {"fuse_allreduce_rms": false}}'' --distributed-executor-backend ray


### 2. NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 ###
# - Container: Nemotron Ultra compatible vLLM
# - MTP: off
# - Environment Variables:
#       - VLLM_ALLOW_LONG_MAX_MODEL_LEN: 0
#       - VLLM_USE_FLASHINFER_MOE_FP4: 1
#       - VLLM_USE_FLASHINFER_MOE_FP8: 1
#       - VLLM_FLASHINFER_MOE_BACKEND: throughput
# - vLLM command: vllm serve nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 --tensor-parallel-size=8
#     --pipeline-parallel-size=1 --data-parallel-size=1 --port 8000 --trust-remote-code
#     --served-model-name nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4 --gpu-memory-utilization 0.95
#     --enable-prefix-caching --enable-chunked-prefill --enable-log-requests --enable-auto-tool-choice
#     --tool-call-parser qwen3_coder --reasoning-parser-plugin $MODEL_DIR/ultra_v3_reasoning_parser.py
#     --reasoning-parser ultra_v3 --kv-cache-dtype fp8 --enable-expert-parallel --max-num-seqs 256
#     --mamba-backend flashinfer --mamba-cache-dtype float16 --mamba-ssm-cache-dtype float16
#     --enable-mamba-cache-stochastic-rounding --mamba-cache-philox-rounds 5
#     --model-loader-extra-config
#     ''{"enable_multithread_load": true, "num_threads": 96}'' --compilation-config
#     ''{"pass_config": {"fuse_allreduce_rms": false}}'' --distributed-executor-backend ray


defaults:
  - execution: local
  - deployment: none
  - _self_

execution:
  output_dir: ./results_nvidia_nemotron_3_ultra
  mounts:
    evaluation:
      ./hf_cache: /root/.cache/huggingface

target:
  api_endpoint:
    model_id: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
    url: https://integrate.api.nvidia.com/v1/chat/completions  # or your served model URL
    api_key_name: NGC_API_KEY # API Key with access to build.nvidia.com

evaluation:
  env_vars:
    HF_TOKEN: host:HF_TOKEN
    HF_HOME: host:HF_HOME
    JUDGE_API_KEY: host:JUDGE_API_KEY # API Key with access to gpt-4o for HLE, IMO-AnswerBench
    GEMINI_API_KEY: host:GEMINI_API_KEY # API Key with access to Gemini-3-Flash-Preview for AA-Omniscience
    QWEN_API_KEY: host:QWEN_API_KEY # API Key with access to qwen/qwen3-235b-a22b for AA-LCR
    ARTIFICIAL_ANALYSIS_API_KEY: host:ARTIFICIAL_ANALYSIS_API_KEY # API Key for CritPT

  nemo_evaluator_config:
    config:
      params:
        parallelism: 1
        temperature: 1.0
        top_p: 0.95
        request_timeout: 3600
        max_retries: 10
        extra:
          tokenizer_backend: huggingface
          tokenizer: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16
    target:
      api_endpoint:
        adapter_config:
          params_to_remove:
            - max_tokens
            - max_completion_tokens
          params_to_add:
            chat_template_kwargs:
              enable_thinking: true
            skip_special_tokens: false
          use_system_prompt: false
          use_reasoning: true
          use_caching: true
          use_progress_tracking: true
          tracking_requests_stats: true
          log_failed_requests: true
          use_request_logging: true
          max_logged_requests: 10
          use_response_logging: true
          max_logged_responses: 10

  tasks:
  - name: ns_gpqa
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
            args: "++prompt_config=eval/aai/mcq-4choices"
  - name: nemo_skills.ns_hle_aa
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 1
            args: "++server.enable_soft_fail=True"
            judge:
              api_key: JUDGE_API_KEY
              model_id: azure/openai/gpt-4o
              url: https://inference-api.nvidia.com/v1
              hle_strict_judge: true
  - name: ns_mmlu_pro
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 1
            args: "++prompt_config=eval/aai/mcq-10choices-boxed" #pragma: allowlist secret
  - name: ns_mmlu_prox
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 1
  - name: ns_scicode
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
  - name: nemo_skills.ns_critpt
    env_vars:
      ARTIFICIAL_ANALYSIS_API_KEY: host:ARTIFICIAL_ANALYSIS_API_KEY
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 5
  - name: nemo_skills.ns_ifbench
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
  - name: ns_aa_lcr
    env_vars:
      JUDGE_API_KEY: host:QWEN_API_KEY
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 16
            judge:
              url: ... # Set your API URL for the judge model (non-reasoning qwen/qwen3-235b-a22b)
              model_id: ... # Set your model_id for the judge model (non-reasoning qwen/qwen3-235b-a22b)
              api_key: JUDGE_API_KEY
  - name: nemo_skills.ns_omniscience
    env_vars:
      JUDGE_API_KEY: host:GEMINI_API_KEY
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 10
            args: "++parse_reasoning=False"
            judge:
              api_key: JUDGE_API_KEY
              model_id: ...
              url: ...
  - name: nemo_skills.ns_imo_answerbench
    env_vars:
      JUDGE_API_KEY: host:JUDGE_API_KEY
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 5
  - name: multi-challenge
    env_vars:
      JUDGE_API_KEY: host:JUDGE_API_KEY
      OPENAI_API_KEY: host:JUDGE_API_KEY
    nemo_evaluator_config:
      config:
        params:
          extra:
            attempts: 1
            num_repeats: 8
            judge_api_key: JUDGE_API_KEY
            seed: 42
  - name: ns_wmt24pp_comet
    nemo_evaluator_config:
      config:
        params:
          extra:
            comet:
              model_path: /path/to/XCOMET-XXL/checkpoints/model.ckpt
