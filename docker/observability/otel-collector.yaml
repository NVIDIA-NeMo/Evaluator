# OpenTelemetry Collector config: accept OTLP from in-container engines
# (e.g. dynamo frontend) and write traces + logs as JSONL to Lustre.
#
# Used by `nemo_evaluator.orchestration.slurm_gen._dynamo_benchmark_command`
# which spawns `otelcol-contrib --config /etc/otelcol/file-exporter.yaml`
# alongside the bench step. Paths are env-expanded at collector startup
# from $OUTPUT_DIR, which the bench command exports before spawn.
#
# Identity attribution (run_id, model, slurm_job_id) is added via the
# `resource` processor below, reading from env vars the bench shell
# exports before spawning the collector. This is the OTel equivalent of
# MR !167's `--label` flags on scrape_metrics — keeps multiple runs in
# one Tempo/Loki store distinguishable.
#
# Metrics are NOT in any pipeline here: dynamo exposes them on /metrics
# (Prometheus shape, scraped by scrape_metrics.py — see MR !167).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resource:
    attributes:
      - key: run_id
        value: ${env:NEL_RUN_ID}
        action: insert
      - key: model
        value: ${env:NEL_MODEL}
        action: insert
      - key: slurm_job_id
        value: ${env:SLURM_JOB_ID}
        action: insert

exporters:
  file/traces:
    path: ${env:OUTPUT_DIR}/otel/traces.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7
  file/logs:
    path: ${env:OUTPUT_DIR}/otel/logs.jsonl
    rotation:
      max_megabytes: 100
      max_days: 7

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource]
      exporters: [file/traces]
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [file/logs]
