# PinchBench reference playbook. Requires ``services.model`` (solver) and
# ``services.judge`` (LLM-as-judge for llm_judge/hybrid tasks) plus AWS
# credentials for the ECS Fargate sandbox.

name: pinchbench
timeout: 1800.0
max_concurrent: 30
solver:
  type: openclaw
  service: model
sandbox:
  type: ecs_fargate
  image: ghcr.io/openclaw/openclaw:2026.4.15
  ecr_repository: ""
  cpu: "2048"
  memory: "4096"
  timeout: 1800.0
  concurrency: 30
  log_stream_prefix: pinchbench
scoring:
  metrics:
    - type: judge
      name: pinchbench_rubric
      service: judge
